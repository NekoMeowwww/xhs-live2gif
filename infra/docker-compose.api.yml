# Tier B (stateless): API + frontend + Redis. Never touches Chrome or the
# logged-in session — that's Tier A, run via infra/systemd on a separate host
# (see docs/cdp-bootstrap.md). Tier B can be redeployed/scaled freely.
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  api:
    build:
      context: ..
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    env_file: ./api.env
    environment:
      - XHS_REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ../packages/frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  redis-data:
