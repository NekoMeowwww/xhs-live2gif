<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小红书实况图转 GIF</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <main>
    <h1>小红书实况图 → GIF</h1>
    <p class="subtitle">从小红书 App 复制链接，直接粘贴整段分享文案即可，自动提取实况图片并转换成 GIF。</p>

    <form id="job-form">
      <input
        id="url-input"
        type="text"
        placeholder="直接粘贴，例如：敲代码的可爱小熊 http://xhslink.com/o/... 存下链接，去【小红书】阅读全文~"
        autocomplete="off"
        required
      />
      <button id="submit-btn" type="submit">开始转换</button>
    </form>

    <fieldset id="format-fieldset" class="format-fieldset">
      <label><input type="radio" name="format" value="gif" checked /> GIF（转码，画质/帧率会被压缩）</label>
      <label><input type="radio" name="format" value="mp4" /> MP4（原始实况视频，无转码，画质更高更快）</label>
    </fieldset>

    <div id="progress-wrap" class="progress-wrap" hidden>
      <progress id="progress-bar" max="100" value="0"></progress>
      <span id="progress-label" class="progress-label"></span>
    </div>

    <p id="status-line" class="status" hidden></p>

    <section id="result" hidden>
      <p id="result-message"></p>
      <a id="zip-link" class="zip-link" hidden download>下载全部 (.zip)</a>
      <div id="gif-grid" class="gif-grid"></div>
    </section>

    <footer class="feedback-footer">反馈 QQ 群：1030250305</footer>
  </main>

  <script src="src/app.js"></script>
</body>
</html>
